<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Management | POS CORE</title>
    <style>
        :root {
            --sidebar-dark: #2c3e50;
            --accent-orange: #e67e22;
            --bg-page: #f4f6f9;
            --text-white: #ffffff;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            padding: 40px;
        }

        .back-link {
            text-decoration: none;
            color: var(--sidebar-dark);
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 700px;
            margin: 0 auto;
        }

        h2 { color: var(--sidebar-dark); margin-top: 0; display: flex; align-items: center; gap: 10px; }

        .input-group { display: flex; gap: 10px; margin: 25px 0; }

        input {
            flex: 1;
            padding: 12px;
            border: 1.5px solid #dee2e6;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: var(--accent-orange); }

        .btn-save {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        thead { background: var(--sidebar-dark); color: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }

        /* Action Buttons */
        .actions { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-action {
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            border: 1.5px solid transparent;
        }
        .btn-edit { border-color: var(--sidebar-dark); color: var(--sidebar-dark); background: white; }
        .btn-edit:hover { background: var(--sidebar-dark); color: white; }
        .btn-delete { border-color: #e74c3c; color: #e74c3c; background: white; }
        .btn-delete:hover { background: #e74c3c; color: white; }

        /* --- MODAL STYLING --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--sidebar-dark);
            color: white;
            padding: 30px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: left;
        }
        .modal-content h3 { color: var(--accent-orange); margin-top: 0; }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; }
        .btn-confirm { background: var(--accent-orange); color: white; }
        .btn-cancel { background: #7f8c8d; color: white; }
      .btn-back {
            background: #fff;
            border: 1px solid #ccc;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
            color: #333;
            text-decoration: none;
            font-size: 13px;
        }
        .btn-back:hover { background: #f9f9f9; }
    </style>
</head>
<body>

    <a href="dashboard.html" class="btn-back">Back to Dashboard</a>

    <div class="card">
        <h2>📂 Category Management</h2>
        <div class="input-group">
            <input type="text" id="catName" placeholder="Enter Category Name">
            <button class="btn-save" onclick="saveCategory()">Save Category</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 70%;">Category Name</th>
                    <th style="text-align: right;">Actions</th>
                </tr>
            </thead>
            <tbody id="categoryTableBody"></tbody>
        </table>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit Category</h3>
            <p style="font-size: 12px; color: #bdc3c7;">Update the name of this category</p>
            <input type="hidden" id="editCatId">
            <input type="text" id="editCatName" style="width: 100%; background: #34495e; color: white; border: 1px solid #455a64;">
            
            <div class="modal-footer">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn btn-confirm" onclick="confirmEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const tableBody = document.getElementById('categoryTableBody');
        const input = document.getElementById('catName');

        async function loadCategories() {
            try {
                const result = await window.authAPI.getCategories();
                if (result.success) {
                    tableBody.innerHTML = result.categories.map(cat => `
    <tr>
        <td style="font-weight: 500;">${cat.name}</td>
        <td class="actions" style="justify-content: flex-end;">
            <!-- Ensure cat.id is passed here -->
            <button class="btn-action btn-edit" onclick="openEditModal('${cat.id}', '${cat.name}')">Edit</button>

            <button class="btn-action btn-delete" onclick="handleDelete(${cat.id})">Delete</button>
        </td>
    </tr>
`).join('');
                }
            } catch (err) { console.error(err); }
        }

        async function saveCategory() {
            const name = input.value.trim();
            if (!name) return;
            const result = await window.authAPI.addCategory(name);
            if (result.success) { input.value = ''; loadCategories(); }
        }

        // Modal Functions
function openEditModal(id, currentName) {
    
    document.getElementById('editCatId').value = id;
    document.getElementById('editCatName').value = currentName;
            document.getElementById('editModal').style.display = 'flex';
             
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        async function confirmEdit() {
            const id = document.getElementById('editCatId').value;
            const newName = document.getElementById('editCatName').value.trim();
            if (!newName) return;

            const result = await window.authAPI.updateCategory(id, newName);
            if (result.success) {
                closeModal();
                loadCategories();
            } else { alert("Update failed: " + result.error); }
        }

        async function handleDelete(id) {
            // Since confirm() might also be blocked in some setups, we use standard confirm here.
            // If this also errors, let me know and I will add a Delete Confirmation Modal too.
            if (confirm("Are you sure you want to delete this category?")) {
                const result = await window.authAPI.deleteCategory(id);
                if (result.success) loadCategories();
            }
        }

        window.onload = loadCategories;
    </script>
</body>
</html>
