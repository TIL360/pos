<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register New Medicine | Pharmacy Management 2026</title>
    <style>
        :root { 
            --medical-blue: #102a43; 
            --teal-accent: #3ebd93; 
            --bg-light: #f0f4f8; 
            --white: #ffffff; 
            --border: #d9e2ec;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-light); 
            padding: 40px; margin: 0; 
        }
        .form-container { 
            background: var(--white); padding: 40px; border-radius: 20px; 
            max-width: 650px; margin: auto; 
            box-shadow: 0 15px 35px rgba(16, 42, 67, 0.1); 
            border: 1px solid var(--border);
        }
        h2 { 
            color: var(--medical-blue); text-align: center; margin-top: 0; 
            margin-bottom: 30px; font-size: 24px; font-weight: 700;
        }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; margin-bottom: 8px; color: #486581; 
            font-weight: 600; font-size: 13px; text-transform: uppercase; 
        }
        input, select { 
            width: 100%; padding: 14px; border: 2px solid var(--border); 
            border-radius: 10px; box-sizing: border-box; font-size: 16px; 
            transition: all 0.3s; 
        }
        input:focus, select:focus { 
            outline: none; border-color: var(--teal-accent); 
            box-shadow: 0 0 0 4px rgba(62, 189, 147, 0.1); 
        }
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .row .form-group { flex: 1; margin-bottom: 0; }
        
        button { 
            background: var(--medical-blue); color: white; border: none; 
            padding: 16px; cursor: pointer; border-radius: 12px; width: 100%; 
            font-size: 16px; font-weight: 700; margin-top: 15px; 
            transition: 0.3s; box-shadow: 0 8px 15px rgba(16, 42, 67, 0.2);
        }
        button:hover { background: var(--teal-accent); transform: translateY(-2px); }
        
        .back-link { 
            display: block; margin-top: 25px; text-align: center; 
            color: #829ab1; text-decoration: none; font-size: 14px; font-weight: 600; 
        }
        .back-link:hover { color: var(--medical-blue); text-decoration: underline; }
        
        .helper-text { color: #829ab1; font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>📦 Register New Medicine</h2>
    <form id="itemForm">
        <div class="form-group">
            <label>Medicine Name (Brand/Generic)</label>
            <input type="text" id="name" required placeholder="e.g., Panadol 500mg (Paracetamol)">
        </div>

        <div class="form-group">
            <label>Barcode / GTIN</label>
            <input type="text" id="barcode" required placeholder="Scan strip or enter unique code">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Pharmacy Cost (Rs.)</label>
                <input type="number" id="cost_price" step="0.01" required placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Retail Price (Rs.)</label>
                <input type="number" id="price" step="0.01" required placeholder="0.00">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Category</label>
                <select id="category" required>
                    <option value="">-- Select Group --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Initial Stock (Units)</label>
                <input type="number" id="stock" value="0" required>
            </div>
        </div>

        <div class="form-group">
            <label>Target Stock Level (100%)</label>
            <input type="number" id="min_stock_level" required placeholder="e.g., 50">
            <div class="helper-text">💡 System alerts will trigger when stock falls below 50% of this value.</div>
        </div>

        <button type="submit" id="submitBtn">Add to Inventory Ledger</button>
    </form>
    <a href="dashboard.html" class="back-link">← Cancel and Exit</a>
</div>

<script>
    const dropdown = document.getElementById('category');
    const itemForm = document.getElementById('itemForm');

    // 1. Load Medicine Categories
    async function loadCategories() {
        try {
            const result = await window.authAPI.getCategories();
            if (result.success && result.categories.length > 0) {
                dropdown.innerHTML = '<option value="">-- Select Group --</option>';
                result.categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.name;
                    opt.textContent = cat.name;
                    dropdown.appendChild(opt);
                });
            } else {
                dropdown.innerHTML = '<option value="">No Groups Found</option>';
            }
        } catch (err) {
            dropdown.innerHTML = '<option value="">Error Loading Groups</option>';
        }
    }

    // 2. Save Medicine to Database
    itemForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "Registering...";
        submitBtn.disabled = true;

        const itemData = {
            name: document.getElementById('name').value,
            barcode: document.getElementById('barcode').value,
            cost_price: parseFloat(document.getElementById('cost_price').value),
            price: parseFloat(document.getElementById('price').value),
            stock: parseInt(document.getElementById('stock').value),
            category: document.getElementById('category').value,
            min_stock_level: parseInt(document.getElementById('min_stock_level').value)
        };

        try {
            const result = await window.authAPI.addItem(itemData);
            if (result.success) {
                alert('Medicine Registered Successfully!');
                window.location.href = 'dashboard.html';
            } else {
                alert('Error: ' + result.error);
                submitBtn.innerText = "Add to Inventory Ledger";
                submitBtn.disabled = false;
            }
        } catch (err) {
            alert('Connection Lost: Check Database Link.');
            submitBtn.disabled = false;
        }
    });

    window.onload = loadCategories;
</script>
</body>
</html>
