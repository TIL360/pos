<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Management | RMS</title>
    <style>
        :root {
            --medical-blue: #102a43;
            --teal-accent: #3ebd93;
            --bg-light: #f0f4f8;
            --white: #ffffff;
            --text-dark: #243b53;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-light);
            margin: 0; padding: 40px; color: var(--text-dark);
        }
        .back-link {
            text-decoration: none; color: var(--medical-blue);
            font-weight: bold; display: inline-block; margin-bottom: 20px;
        }
        .card {
            background: var(--white); padding: 35px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #d9e2ec; max-width: 700px; margin: 0 auto;
        }
        h2 { color: var(--medical-blue); margin-top: 0; font-size: 22px; }
        p.helper { color: #627d98; font-size: 0.9rem; margin-bottom: 25px; }

        .input-group { display: flex; gap: 12px; margin: 25px 0; }
        input {
            flex: 1; padding: 14px; border: 2px solid #d9e2ec;
            border-radius: 10px; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--teal-accent); box-shadow: 0 0 8px rgba(62, 189, 147, 0.1); }

        .btn-save {
            background-color: var(--medical-blue); color: white; border: none;
            padding: 12px 28px; border-radius: 10px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
        }
        .btn-save:hover { background-color: var(--teal-accent); transform: translateY(-2px); }

        table { width: 100%; margin-top: 25px; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        thead { background: #f0f4f8; color: var(--medical-blue); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f0f4f8; }
        
        #errorMessage {
            color: #e74c3c; text-align: center; margin-bottom: 15px;
            font-weight: bold; display: none; padding: 12px;
            background: #fff5f5; border-radius: 8px; border: 1px solid #fed7d7;
        }
        .no-data { text-align: center; color: #829ab1; padding: 30px; font-style: italic; }
    </style>
</head>
<body>

<a href="dashboard.html" class="back-link">← Back to Dashboard</a>

<div class="card">
    <h2>📁 Medical Category Management</h2>
    <p class="helper">Organize your pharmaceutical inventory by therapeutic class or department.</p>

    <div id="errorMessage"></div>

    <div class="input-group">
        <input type="text" id="catName" placeholder="Enter Category Name (e.g. Antibiotics, Vaccinations)">
        <button class="btn-save" onclick="saveCategory()">Add Group</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Medical Category Name</th>
            </tr>
        </thead>
        <tbody id="categoryTableBody">
            <tr><td class="no-data">Syncing categories...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const tableBody = document.getElementById('categoryTableBody');
    const errorDiv = document.getElementById('errorMessage');
    const input = document.getElementById('catName');

    // 1. Fetch Categories
    async function loadCategories() {
        try {
            const result = await window.authAPI.getCategories();
            if (result.success) {
                errorDiv.style.display = 'none';
                if (result.categories && result.categories.length > 0) {
                    tableBody.innerHTML = result.categories.map(cat => `
                        <tr>
                            <td><strong>${cat.name}</strong></td>
                        </tr>
                    `).join('');
                } else {
                    tableBody.innerHTML = '<tr><td class="no-data">No categories defined yet.</td></tr>';
                }
            } else {
                showError("Database Error: " + result.error);
            }
        } catch (err) {
            showError("Connection Failed. Check System Bridge.");
        }
    }

    // 2. Save New Category
    async function saveCategory() {
        const name = input.value.trim();
        if (!name) return alert("Please enter a valid category name.");

        try {
            const result = await window.authAPI.addCategory(name);
            if (result.success) {
                input.value = '';
                loadCategories();
            } else {
                alert("Error: " + result.error);
            }
        } catch (err) {
            alert("Failed to save: " + err.message);
        }
    }

    function showError(msg) {
        errorDiv.innerText = msg;
        errorDiv.style.display = 'block';
        tableBody.innerHTML = '';
    }

    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveCategory(); });
    window.onload = loadCategories;
</script>
</body>
</html>
